<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Календарь событий</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css" />
  <!-- Официальный скрипт Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Календарь событий</h1>
      <p id="current-year"></p>
    </header>

    <main class="app-main">
      <section class="calendar-year" id="calendar-year"></section>

      <section class="event-panel">
        <h2 id="event-panel-title"></h2>
        <div class="selected-date" id="selected-date"></div>

        <div class="events-list-container" id="date-events-container">
          <h3>События выбранной даты</h3>
          <ul id="events-for-date"></ul>
        </div>

        <div class="events-list-container">
          <h3>Ближайшие события</h3>
          <ul id="upcoming-events"></ul>
        </div>
      </section>
    </main>
  </div>

  <!-- Модальное окно добавления/редактирования события -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-dialog">
      <div class="modal-header">
        <div>
          <h2 class="modal-title" id="event-modal-title">События выбранной даты</h2>
          <p class="modal-date" id="event-modal-date"></p>
        </div>
        <div class="modal-header-buttons">
          <button type="button" id="event-open-form-button" class="modal-add-button">+</button>
          <button type="button" id="event-close-button" class="modal-close-button">×</button>
        </div>
      </div>

      <div class="events-list-container">
        <h3></h3>
        <ul id="modal-events-for-date"></ul>
      </div>

      <form id="event-form" class="hidden">
        <label>
          Описание события
          <textarea id="event-title" placeholder="Например: День рождения мамы" required></textarea>
        </label>

        <div class="event-datetime-row">
          <label>
            Время начала
            <input id="event-start-time" type="time" />
          </label>

          <label>
            Дата конца
            <input id="event-end-date" type="date" />
          </label>

          <label>
            Время конца
            <input id="event-end-time" type="time" />
          </label>
        </div>

        <label>
          Доп. заметка (необязательно)
          <input id="event-note" type="text" placeholder="Адрес, время и т.п." />
        </label>

        <div class="modal-actions">
          <button type="button" id="event-cancel-button">Отмена</button>
          <button type="submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Подключаем логику -->
  <script src="main.js"></script>
</body>
</html>
